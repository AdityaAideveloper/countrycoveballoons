<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Country Cove Balloons</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 120px auto 0;
            padding: 0 20px;
        }
        .admin-tabs {
            display: flex;
            margin-bottom: 2rem;
            border-bottom: 2px solid #eee;
        }
        .admin-tab {
            padding: 1rem 2rem;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-weight: 500;
            color: #666;
            transition: all 0.3s;
        }
        .admin-tab.active {
            color: #ff69b4;
            border-bottom-color: #ff69b4;
        }
        .admin-content {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .admin-section {
            display: none;
        }
        .admin-section.active {
            display: block;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        .data-table th,
        .data-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        .data-table th {
            background: #f8f9fa;
            font-weight: 600;
        }
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .status-pending {
            background: #fff3cd;
            color: #856404;
        }
        .status-completed {
            background: #d4edda;
            color: #155724;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group.full-width {
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <h1>🎈 Country Cove Balloons - Admin</h1>
            </div>
            <nav class="nav">
                <a href="index.html">View Site</a>
                <a href="#" onclick="logout()">Logout</a>
            </nav>
        </div>
    </header>

    <!-- Admin Panel -->
    <div class="admin-container">
        <div class="admin-tabs">
            <button class="admin-tab active" onclick="showTab('products')">Products</button>
            <button class="admin-tab" onclick="showTab('orders')">Orders</button>
            <button class="admin-tab" onclick="showTab('add-product')">Add Product</button>
        </div>

        <div class="admin-content">
            <!-- Products Tab -->
            <div id="products-tab" class="admin-section active">
                <h2>Manage Products</h2>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Rating</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="products-table-body">
                        <!-- Products will be loaded here -->
                    </tbody>
                </table>
            </div>

            <!-- Orders Tab -->
            <div id="orders-tab" class="admin-section">
                <h2>Manage Orders</h2>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Customer</th>
                            <th>Email</th>
                            <th>Total</th>
                            <th>Status</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="orders-table-body">
                        <!-- Orders will be loaded here -->
                    </tbody>
                </table>
            </div>

            <!-- Add Product Tab -->
            <div id="add-product-tab" class="admin-section">
                <h2>Add New Product</h2>
                <form id="add-product-form">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="product-name">Product Name</label>
                            <input type="text" id="product-name" required>
                        </div>
                        <div class="form-group">
                            <label for="product-price">Price (₹)</label>
                            <input type="number" id="product-price" step="0.01" required>
                        </div>
                        <div class="form-group">
                            <label for="product-category">Category</label>
                            <select id="product-category" required>
                                <option value="birthday">Birthday</option>
                                <option value="wedding">Wedding</option>
                                <option value="anniversary">Anniversary</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="product-color">Color</label>
                            <select id="product-color" required>
                                <option value="red">Red</option>
                                <option value="blue">Blue</option>
                                <option value="pink">Pink</option>
                                <option value="gold">Gold</option>
                                <option value="multi">Multi</option>
                            </select>
                        </div>
                        <div class="form-group full-width">
                            <label for="product-description">Description</label>
                            <textarea id="product-description" required></textarea>
                        </div>
                        <div class="form-group full-width">
                            <label for="product-image">Image URL</label>
                            <input type="url" id="product-image" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Product</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Tab switching
        function showTab(tabName) {
            // Hide all sections
            document.querySelectorAll('.admin-section').forEach(section => {
                section.classList.remove('active');
            });
            document.querySelectorAll('.admin-tab').forEach(tab => {
                tab.classList.remove('active');
            });

            // Show selected section
            document.getElementById(tabName + '-tab').classList.add('active');
            event.target.classList.add('active');

            // Load data for the tab
            if (tabName === 'products') {
                loadProducts();
            } else if (tabName === 'orders') {
                loadOrders();
            }
        }

        // Load products
        async function loadProducts() {
            try {
                const response = await fetch('backend/api.php/products');
                const products = await response.json();

                const tbody = document.getElementById('products-table-body');
                tbody.innerHTML = products.map(product => `
                    <tr>
                        <td>${product.id}</td>
                        <td>${product.name}</td>
                        <td>${product.category}</td>
                        <td>₹${product.price}</td>
                        <td>${product.rating}</td>
                        <td>
                            <button onclick="editProduct(${product.id})" class="btn btn-secondary" style="padding: 0.25rem 0.5rem; margin-right: 0.5rem;">Edit</button>
                            <button onclick="deleteProduct(${product.id})" class="btn btn-secondary" style="padding: 0.25rem 0.5rem; background: #ff4757; color: white;">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error loading products:', error);
            }
        }

        // Load orders
        async function loadOrders() {
            try {
                const response = await fetch('backend/api.php/orders');
                const orders = await response.json();

                const tbody = document.getElementById('orders-table-body');
                tbody.innerHTML = orders.map(order => `
                    <tr>
                        <td>${order.id}</td>
                        <td>${order.customer_name}</td>
                        <td>${order.customer_email}</td>
                        <td>₹${order.total_amount}</td>
                        <td><span class="status-badge status-${order.status}">${order.status}</span></td>
                        <td>${new Date(order.created_at).toLocaleDateString()}</td>
                        <td>
                            <button onclick="viewOrder(${order.id})" class="btn btn-secondary" style="padding: 0.25rem 0.5rem;">View</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error loading orders:', error);
            }
        }

        // Add product
        document.getElementById('add-product-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const productData = {
                name: document.getElementById('product-name').value,
                description: document.getElementById('product-description').value,
                price: parseFloat(document.getElementById('product-price').value),
                category: document.getElementById('product-category').value,
                color: document.getElementById('product-color').value,
                image: document.getElementById('product-image').value,
                rating: 0
            };

            try {
                const response = await fetch('backend/api.php/products', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(productData)
                });

                if (response.ok) {
                    alert('Product added successfully!');
                    this.reset();
                    showTab('products');
                } else {
                    alert('Error adding product');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error adding product');
            }
        });

        // Edit product (placeholder)
        function editProduct(id) {
            alert('Edit functionality will be implemented');
        }

        // Delete product (placeholder)
        function deleteProduct(id) {
            if (confirm('Are you sure you want to delete this product?')) {
                alert('Delete functionality will be implemented');
            }
        }

        // View order (placeholder)
        function viewOrder(id) {
            alert('View order functionality will be implemented');
        }

        // Logout
        function logout() {
            window.location.href = 'index.html';
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadProducts();
        });
    </script>
</body>
</html>
