<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Country Cove Balloons</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Premium Background */
        .login-page {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        
        .login-page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(255, 77, 141, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(212, 175, 55, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(155, 95, 224, 0.1) 0%, transparent 40%);
            pointer-events: none;
        }
        
        /* Floating Balloons */
        .balloons-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        
        .bg-balloon {
            position: absolute;
            border-radius: 50% 50% 50% 50%/58% 58% 42% 42%;
            opacity: 0.08;
            animation: floatUp linear infinite;
        }
        
        @keyframes floatUp {
            0% {
                transform: translateY(110vh) rotate(0deg);
            }
            100% {
                transform: translateY(-20vh) rotate(360deg);
            }
        }
        
        /* Premium Glass Card */
        .auth-container {
            max-width: 550px;
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.05),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 10;
            animation: fadeInUp 0.8s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .auth-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, 
                rgba(255, 77, 141, 0.3), 
                rgba(212, 175, 55, 0.3), 
                rgba(155, 95, 224, 0.3), 
                rgba(255, 77, 141, 0.3));
            border-radius: 32px;
            z-index: -1;
            opacity: 0.5;
            animation: borderGlow 3s ease-in-out infinite;
        }
        
        @keyframes borderGlow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        
        /* Premium Header */
        .auth-container > div:first-child {
            font-size: 4.5rem;
            margin-bottom: 1.5rem;
            text-align: center;
            animation: bounce 2s ease-in-out infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        #authTitle {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFD93D, #FF4D8D);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        
        #authSubtitle {
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            margin-bottom: 2.5rem;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        
        /* Premium Tabs */
        .auth-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .auth-tab {
            flex: 1;
            padding: 14px 20px;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .auth-tab::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #FF4D8D, #FFD93D);
            opacity: 0;
            transition: opacity 0.4s;
        }
        
        .auth-tab:hover {
            color: white;
        }
        
        .auth-tab.active {
            color: #1a1a2e;
            background: linear-gradient(135deg, #FFD93D, #FF4D8D);
            box-shadow: 0 8px 25px rgba(255, 77, 141, 0.4);
            transform: translateY(-2px);
        }
        
        .auth-tab span {
            position: relative;
            z-index: 1;
        }
        
        /* Premium Role Selector */
        .role-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .role-option {
            flex: 1;
            padding: 25px 20px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            cursor: pointer;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        .role-option::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255, 77, 141, 0.2), rgba(212, 175, 55, 0.2));
            opacity: 0;
            transition: opacity 0.4s;
        }
        
        .role-option:hover {
            border-color: rgba(255, 217, 61, 0.5);
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(255, 77, 141, 0.2);
        }
        
        .role-option.selected {
            border-color: #FFD93D;
            background: linear-gradient(135deg, rgba(255, 217, 61, 0.15), rgba(255, 77, 141, 0.15));
            box-shadow: 0 15px 40px rgba(255, 217, 61, 0.3);
            transform: translateY(-5px);
        }
        
        .role-option .icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }
        
        .role-option .label {
            font-weight: 700;
            font-size: 1rem;
            position: relative;
            z-index: 1;
        }
        
        .role-option .desc {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-top: 6px;
            position: relative;
            z-index: 1;
        }
        
        /* Premium Form Styles */
        .form-section {
            display: none;
        }
        
        .form-section.active {
            display: block;
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            color: white;
            font-size: 0.95rem;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
            outline: none;
        }
        
        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #FFD93D;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(255, 217, 61, 0.2);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        /* Premium Button */
        .btn-primary {
            width: 100%;
            padding: 18px 30px;
            background: linear-gradient(135deg, #FF4D8D, #FFD93D);
            border: none;
            border-radius: 14px;
            color: #1a1a2e;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(255, 77, 141, 0.3);
        }
        
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 77, 141, 0.5);
        }
        
        .btn-primary:hover::before {
            left: 100%;
        }
        
        .btn-primary:active {
            transform: translateY(-1px);
        }
        
        /* Form Divider */
        .form-divider {
            text-align: center;
            margin: 25px 0;
            color: rgba(255, 255, 255, 0.5);
            position: relative;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 1px;
        }
        
        .form-divider::before,
        .form-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
        }
        
        .form-divider::before { left: 0; }
        .form-divider::after { right: 0; }
        
        /* Switch Text */
        .switch-text {
            text-align: center;
            margin-top: 25px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }
        
        .switch-text a {
            color: #FFD93D;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
            position: relative;
        }
        
        .switch-text a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: #FFD93D;
            transition: width 0.3s;
        }
        
        .switch-text a:hover::after {
            width: 100%;
        }
        
        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(135deg, rgba(255, 77, 141, 0.95), rgba(212, 175, 55, 0.95));
            color: #1a1a2e;
            padding: 16px 30px;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 600;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        
        /* Social Login */
        .social-login {
            margin-top: 25px;
        }
        
        .social-login p {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            margin-bottom: 15px;
        }
        
        .social-buttons {
            display: flex;
            gap: 12px;
        }
        
        .social-btn {
            flex: 1;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .social-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            border-color: rgba(255, 217, 61, 0.5);
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            .auth-container {
                padding: 35px 25px;
                border-radius: 24px;
            }
            
            .role-selector {
                flex-direction: column;
            }
            
            .role-option {
                padding: 20px;
            }
            
            #authTitle {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- Floating Balloons Background -->
    <div class="balloons-bg" id="balloonsBg"></div>
    
    <!-- Premium Back to Home -->
    <a href="index.html" style="position: fixed; top: 30px; left: 30px; z-index: 100; color: rgba(255,255,255,0.7); text-decoration: none; font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; transition: all 0.3s; backdrop-filter: blur(10px); background: rgba(255,255,255,0.08); padding: 12px 20px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.15);" onmouseover="this.style.color='#FFD93D'; this.style.transform='translateX(-5px)'" onmouseout="this.style.color='rgba(255,255,255,0.7)'; this.style.transform='translateX(0)'">
        ← Back to Home
    </a>
    
    <!-- Premium Login Section -->
    <section class="login-page">
        <div class="auth-container">
            <div style="font-size: 4.5rem; margin-bottom: 1.5rem; text-align: center;">🎈</div>
            <h1 id="authTitle">Welcome Back!</h1>
            <p id="authSubtitle">Login to access your premium account</p>
            
            <!-- Auth Tabs -->
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchAuthMode('login')"><span>🔐 Login</span></button>
                <button class="auth-tab" onclick="switchAuthMode('register')"><span>📝 Register</span></button>
            </div>
            
            <!-- Role Selector (for Register) -->
            <div id="roleSelector" class="form-section">
                <p style="color: rgba(255,255,255,0.8); margin-bottom: 15px; text-align: center; font-weight: 500;">I want to:</p>
                <div class="role-selector">
                    <div class="role-option selected" data-role="user" onclick="selectRole('user')">
                        <div class="icon">🛍️</div>
                        <div class="label">Shop</div>
                        <div class="desc">Buy balloons</div>
                    </div>
                    <div class="role-option" data-role="store" onclick="selectRole('store')">
                        <div class="icon">🏪</div>
                        <div class="label">Sell</div>
                        <div class="desc">Open store</div>
                    </div>
                </div>
            </div>
            
            <!-- Login Form -->
            <div id="loginForm" class="form-section active">
                <form id="login-form">
                    <div class="form-group">
                        <label for="loginEmail">Email Address</label>
                        <input type="email" id="loginEmail" required placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" required placeholder="Enter your password">
                    </div>
                    <button type="submit" class="btn btn-primary">🚀 Login to Account</button>
                </form>
                
                <!-- Social Login -->
                <div class="social-login">
                    <p>Or continue with</p>
                    <div class="social-buttons">
                        <button class="social-btn" title="Google">G</button>
                        <button class="social-btn" title="Facebook">f</button>
                        <button class="social-btn" title="Apple"></button>
                    </div>
                </div>
                
                <p class="switch-text">Don't have an account? <a onclick="switchAuthMode('register')">Register here</a></p>
            </div>
            
            <!-- User Register Form -->
            <div id="userRegisterForm" class="form-section">
                <form id="register-user-form">
                    <div class="form-group">
                        <label for="userName">Full Name</label>
                        <input type="text" id="userName" required placeholder="Enter your full name">
                    </div>
                    <div class="form-group">
                        <label for="userEmail">Email Address</label>
                        <input type="email" id="userEmail" required placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label for="userPhone">Phone Number</label>
                        <input type="tel" id="userPhone" placeholder="Enter your phone number">
                    </div>
                    <div class="form-group">
                        <label for="userPassword">Password</label>
                        <input type="password" id="userPassword" required placeholder="Create a strong password">
                    </div>
                    <div class="form-group">
                        <label for="userAddress">Delivery Address</label>
                        <textarea id="userAddress" rows="2" placeholder="Enter your delivery address"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">✨ Create Premium Account</button>
                </form>
                <p class="switch-text">Already have an account? <a onclick="switchAuthMode('login')">Login here</a></p>
            </div>
            
            <!-- Store Register Form -->
            <div id="storeRegisterForm" class="form-section">
                <form id="register-store-form">
                    <div class="form-group">
                        <label for="storeOwnerName">Owner Name</label>
                        <input type="text" id="storeOwnerName" required placeholder="Enter your name">
                    </div>
                    <div class="form-group">
                        <label for="storeEmail">Business Email</label>
                        <input type="email" id="storeEmail" required placeholder="Enter your business email">
                    </div>
                    <div class="form-group">
                        <label for="storePhone">Phone Number</label>
                        <input type="tel" id="storePhone" required placeholder="Enter your phone number">
                    </div>
                    <div class="form-group">
                        <label for="storePassword">Password</label>
                        <input type="password" id="storePassword" required placeholder="Create a secure password">
                    </div>
                    <div class="form-divider">STORE DETAILS</div>
                    <div class="form-group">
                        <label for="storeName">Store Name</label>
                        <input type="text" id="storeName" required placeholder="Enter your store name">
                    </div>
                    <div class="form-group">
                        <label for="storeDescription">Store Description</label>
                        <textarea id="storeDescription" rows="2" placeholder="Describe your store specialties"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="storeBusinessAddress">Business Address</label>
                        <textarea id="storeBusinessAddress" rows="2" placeholder="Enter your business address"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="storeGst">GST Number (Optional)</label>
                        <input type="text" id="storeGst" placeholder="Enter GST number if applicable">
                    </div>
                    <button type="submit" class="btn btn-primary">🏪 Register Premium Store</button>
                </form>
                <p class="switch-text">Already have an account? <a onclick="switchAuthMode('login')">Login here</a></p>
            </div>
        </div>
    </section>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script src="js/script.js"></script>
    <script>
        // Create floating balloons
        function createBalloons() {
            const bg = document.getElementById('balloonsBg');
            const colors = ['#FF4D8D', '#FFD93D', '#9B5FE0', '#00C9A7', '#FF8C42'];
            
            for (let i = 0; i < 12; i++) {
                const balloon = document.createElement('div');
                balloon.className = 'bg-balloon';
                const size = 40 + Math.random() * 80;
                balloon.style.cssText = `
                    width: ${size}px;
                    height: ${size * 1.2}px;
                    left: ${Math.random() * 100}%;
                    background: ${colors[Math.floor(Math.random() * colors.length)]};
                    animation-duration: ${15 + Math.random() * 20}s;
                    animation-delay: ${Math.random() * 10}s;
                `;
                bg.appendChild(balloon);
            }
        }
        
        // Toast notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        // Check if running on XAMPP or Live Server
        function checkServerEnvironment() {
            const hostname = window.location.hostname;
            const port = window.location.port;
            
            // Live Server runs on port 5500/5501/5502 etc.
            if(port === '5500' || port === '5501' || port === '5502' || port === '8080') {
                showToast('❌ STOP! Use XAMPP: http://localhost/balloon-planet/login.html');
                console.error('%cWRONG SERVER!', 'color: red; font-size: 20px;');
                console.error('You are using VS Code Live Server (port ' + port + ')');
                console.error('Live Server CANNOT run PHP files!');
                console.error('Please open: http://localhost/balloon-planet/login.html');
                return false;
            }
            
            // Check if localhost without port (XAMPP)
            if(hostname === 'localhost' || hostname === '127.0.0.1') {
                console.log('%c✓ XAMPP detected', 'color: green');
                return true;
            }
            
            return true;
        }
        
        // Auth mode switcher
        let currentMode = 'login';
        let selectedRole = 'user';
        
        function switchAuthMode(mode) {
            currentMode = mode;
            
            // Update tabs
            document.querySelectorAll('.auth-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Update content
            document.querySelectorAll('.form-section').forEach(section => {
                section.classList.remove('active');
            });
            
            if(mode === 'login') {
                document.getElementById('loginForm').classList.add('active');
                document.getElementById('roleSelector').classList.remove('active');
                document.getElementById('authTitle').textContent = 'Welcome Back!';
                document.getElementById('authSubtitle').textContent = 'Login to access your premium account';
            } else {
                document.getElementById('roleSelector').classList.add('active');
                document.getElementById('authTitle').textContent = 'Create Account';
                document.getElementById('authSubtitle').textContent = 'Join Country Cove Balloons Premium';
                
                // Show appropriate register form
                if(selectedRole === 'user') {
                    document.getElementById('userRegisterForm').classList.add('active');
                } else {
                    document.getElementById('storeRegisterForm').classList.add('active');
                }
            }
        }
        
        function selectRole(role) {
            selectedRole = role;
            
            document.querySelectorAll('.role-option').forEach(option => {
                option.classList.remove('selected');
            });
            document.querySelector(`[data-role="${role}"]`).classList.add('selected');
            
            // Show appropriate register form
            document.querySelectorAll('.form-section').forEach(section => {
                if(section.id !== 'roleSelector') {
                    section.classList.remove('active');
                }
            });
            
            if(role === 'user') {
                document.getElementById('userRegisterForm').classList.add('active');
            } else {
                document.getElementById('storeRegisterForm').classList.add('active');
            }
        }
        
        // Handle Login
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if(!checkServerEnvironment()) return;
            
            const formData = new FormData();
            formData.append('action', 'login');
